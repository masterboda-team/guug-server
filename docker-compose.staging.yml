  #     - apps
  #     - all
  
  stripe-payment:
    container_name: guug-stripe-payment-staging
    image: guug-stripe-payment-staging
    build:
      context: ./apps
      dockerfile: .prodcontainer/stripe/Dockerfile
      args:
        SECRET_KEY: ${SECRET_KEY}
        APL_FILE_PATH: ${STRIPE_PAYMENT_APL_FILE_PATH}
        AWS_ACCESS_KEY_ID: ${STRIPE_PAYMENT_AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY: ${STRIPE_PAYMENT_AWS_SECRET_ACCESS_KEY}
        AWS_ENDPOINT_URL: ${STRIPE_PAYMENT_AWS_ENDPOINT_URL}
        AWS_REGION: ${STRIPE_PAYMENT_AWS_REGION}
        NEXT_PUBLIC_BASE_PATH: ${STRIPE_PAYMENT_NEXT_PUBLIC_BASE_PATH}
        APP_LOG_LEVEL: ${LOG_LEVEL}
        APP_IFRAME_BASE_URL: ${STRIPE_PAYMENT_APP_IFRAME_BASE_URL}
        APP_API_BASE_URL: ${STRIPE_PAYMENT_APP_API_BASE_URL}
        NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    environment:
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    expose:
      - "3000"
    networks:
      - guug-network-staging
    volumes:
      - apl:/app/apl
    profiles:
      - apps
      - all

  nginx:
    container_name: guug-nginx-staging
    image: nginx:latest
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=${NGINX_PORT:-80}
    restart: always
    ports:
      - "8081:80"
      # - "8443:443"
    networks:
      - guug-network-staging
    volumes:
      - ./nginx/nginx-staging.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt/live/shop.guug.it/fullchain.pem:/etc/nginx/cert.pem:ro
      # - /etc/letsencrypt/live/shop.guug.it/privkey.pem:/etc/nginx/cert-key.pem:ro
      - static:/app/static
      - media:/app/media
    profiles:
      - backend
      - all
    depends_on:
      - saleor

  dynamodb:
    container_name: guug-dynamodb-staging
    image: "amazon/dynamodb-local:latest"
    expose:
      - "3000"
    volumes:
      - "dynamodb-data:/home/dynamodblocal/data"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    user: root
    networks:
      - guug-network-staging
    profiles:
      - backend
      - all

volumes:
  static:
    name: guug-static-staging
  media:
    name: guug-media-staging
  apl:
    name: guug-apl-staging
  dynamodb-data:
    name: guug-dynamodb-data-staging
    driver: local

networks:
  guug-network-staging:
